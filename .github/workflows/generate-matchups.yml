name: Generate Pokemon Matchups

on:
  workflow_dispatch:
    inputs:
      library_file:
        description: "Path to a showdown library file in this repo (for example: libraries/champions_ou.txt)"
        required: true
        default: "libraries/champions_ou.txt"
      commit_and_push:
        description: "Commit and push generated matchup files back to the branch"
        required: false
        default: "true"

jobs:
  generate-matchups:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify @smogon/calc dependency resolution
        run: |
          node -e "console.log(require.resolve('@smogon/calc'))"

      - name: Generate matchup files
        env:
          LIBRARY_FILE: ${{ github.event.inputs.library_file }}
        run: |
          node scripts/generate-matchups.js "$LIBRARY_FILE"

      - name: Upload matchup outputs
        env:
          LIBRARY_FILE: ${{ github.event.inputs.library_file }}
        run: |
          BASE_NAME="$(basename "$LIBRARY_FILE" .txt)"
          echo "BASE_NAME=$BASE_NAME" >> "$GITHUB_ENV"

      - name: Commit and push generated files (optional)
        if: ${{ github.event.inputs.commit_and_push == 'true' }}
        env:
          BASE_NAME: ${{ env.BASE_NAME }}
        run: |
          JSON_FILE="matchups/${BASE_NAME}_matchups.json"
          TXT_FILE="matchups/${BASE_NAME}_matchups.txt"
          COMPRESSED_FILE="${JSON_FILE}.gz"
          SPLIT_PREFIX="${COMPRESSED_FILE}.part"
          SPLIT_GLOB="${SPLIT_PREFIX}"*
          MAX_GITHUB_BLOB_SIZE=100000000
          MAX_SPLIT_CHUNK_SIZE=95000000
          JSON_FILE_SIZE="$(wc -c < "$JSON_FILE")"

          if [ "$JSON_FILE_SIZE" -gt "$MAX_GITHUB_BLOB_SIZE" ]; then
            echo "::warning::$JSON_FILE is ${JSON_FILE_SIZE} bytes, exceeding GitHub's 100 MB blob limit."
            echo "::warning::Creating compressed and split outputs for commit/push."

            rm -f "$COMPRESSED_FILE"
            rm -f $SPLIT_GLOB
            gzip -9 -c "$JSON_FILE" > "$COMPRESSED_FILE"
            split -b "$MAX_SPLIT_CHUNK_SIZE" -d -a 3 "$COMPRESSED_FILE" "$SPLIT_PREFIX"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add "$TXT_FILE" "$COMPRESSED_FILE" $SPLIT_GLOB

            if git diff --cached --quiet; then
              echo "No changes to commit."
              exit 0
            fi

            git commit -m "Update ${BASE_NAME} matchups (compressed split output)"
            git push origin "${{ github.ref_name }}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$TXT_FILE" "$JSON_FILE"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update ${BASE_NAME} matchups"
          git push origin "${{ github.ref_name }}"

      - name: Upload JSON output artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BASE_NAME }}_matchups_json
          path: matchups/${{ env.BASE_NAME }}_matchups.json

      - name: Upload text output artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BASE_NAME }}_matchups_txt
          path: matchups/${{ env.BASE_NAME }}_matchups.txt

      - name: Upload compressed/split output artifacts (if present)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BASE_NAME }}_matchups_compressed
          path: |
            matchups/${{ env.BASE_NAME }}_matchups.json.gz
            matchups/${{ env.BASE_NAME }}_matchups.json.gz.part*
          if-no-files-found: ignore
