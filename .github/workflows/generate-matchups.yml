name: Generate Pokemon Matchups

on:
  workflow_dispatch:
    inputs:
      library_file:
        description: "Path to a showdown library file in this repo (for example: libraries/test_set_1.txt)"
        required: true
        default: "libraries/test_set_1.txt"
      commit_and_push:
        description: "Commit and push generated matchup files back to the branch"
        required: false
        default: "false"

jobs:
  generate-matchups:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate matchup files
        env:
          LIBRARY_FILE: ${{ github.event.inputs.library_file }}
        run: |
          node scripts/generate-matchups.js "$LIBRARY_FILE"

      - name: Upload matchup outputs
        env:
          LIBRARY_FILE: ${{ github.event.inputs.library_file }}
        run: |
          BASE_NAME="$(basename "$LIBRARY_FILE" .txt)"
          echo "BASE_NAME=$BASE_NAME" >> "$GITHUB_ENV"

      - name: Commit and push generated files (optional)
        if: ${{ github.event.inputs.commit_and_push == 'true' }}
        env:
          BASE_NAME: ${{ env.BASE_NAME }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "matchups/${BASE_NAME}_matchups.txt" "matchups/${BASE_NAME}_matchups.json"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update ${BASE_NAME} matchups"
          git push origin "${{ github.ref_name }}"

      - name: Upload JSON output artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BASE_NAME }}_matchups_json
          path: matchups/${{ env.BASE_NAME }}_matchups.json

      - name: Upload text output artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BASE_NAME }}_matchups_txt
          path: matchups/${{ env.BASE_NAME }}_matchups.txt
