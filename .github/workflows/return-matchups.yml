name: Return Matchups For One Pokemon

on:
  workflow_dispatch:
    inputs:
      matchups_file:
        description: "Path to matchup input file (for example: matchups/champions_ou_matchups.json)"
        required: true
        default: "matchups/champions_ou_matchups.json"
      rulebook_file:
        description: "Path to return-matchups rulebook JSON"
        required: true
        default: "rulebooks/default-return-matchups-rulebook.json"
      pokemon:
        description: "Selected Pokemon name (for example: Garchomp)"
        required: true
      output_file:
        description: "Path to write return-matchups output JSON"
        required: true
        default: "matchups/garchomp_return_matchups.json"
      trace:
        description: "Include ruleTrace details in output"
        required: false
        default: "false"
      commit_and_push:
        description: "Commit and push return-matchups output back to the branch"
        required: false
        default: "true"

jobs:
  return-matchups:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build single-Pokemon return-matchups output
        env:
          MATCHUPS_FILE: ${{ github.event.inputs.matchups_file }}
          RULEBOOK_FILE: ${{ github.event.inputs.rulebook_file }}
          POKEMON: ${{ github.event.inputs.pokemon }}
          OUTPUT_FILE: ${{ github.event.inputs.output_file }}
          TRACE: ${{ github.event.inputs.trace }}
        run: |
          TRACE_ARG=""
          if [ "$TRACE" = "true" ]; then
            TRACE_ARG="--trace"
          fi

          node scripts/return-matchups.js return-matchups \
            --matchups "$MATCHUPS_FILE" \
            --rulebook "$RULEBOOK_FILE" \
            --pokemon "$POKEMON" \
            --output "$OUTPUT_FILE" \
            $TRACE_ARG

      - name: Commit and push return-matchups output (optional)
        if: ${{ github.event.inputs.commit_and_push == 'true' }}
        env:
          OUTPUT_FILE: ${{ github.event.inputs.output_file }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$OUTPUT_FILE"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update return matchups output"
          git push origin "${{ github.ref_name }}"

      - name: Upload return-matchups output artifact
        uses: actions/upload-artifact@v4
        with:
          name: return_matchups_output
          path: ${{ github.event.inputs.output_file }}
