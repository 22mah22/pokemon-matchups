name: Rank Pokemon Matchups

on:
  workflow_dispatch:
    inputs:
      input_file:
        description: "Path to a matchup or library input file (for example: matchups/champions_ou_matchups.json)"
        required: true
        default: "matchups/champions_ou_matchups.json"
      rulebook_file:
        description: "Path to ranking rulebook JSON (for example: rulebooks/standard-rank-matchups-rulebook.json)"
        required: true
        default: "rulebooks/standard-rank-matchups-rulebook.json"
      output_file:
        description: "Path to write ranking output JSON"
        required: true
        default: "matchups/champions_ou_ranked.json"
      justifications_dir:
        description: "Optional override directory for per-Pokemon justification JSON files"
        required: false
        default: ""
      commit_and_push:
        description: "Commit and push ranking output back to the branch"
        required: false
        default: "true"

jobs:
  rank-matchups:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rehydrate matchup JSON input (if committed as gzip/split)
        env:
          INPUT_FILE: ${{ github.event.inputs.input_file }}
        run: |
          if [ -f "$INPUT_FILE" ]; then
            echo "Input file already present: $INPUT_FILE"
            exit 0
          fi

          case "$INPUT_FILE" in
            *.json)
              GZ_FILE="${INPUT_FILE}.gz"
              PART_GLOB="${GZ_FILE}.part"*

              if compgen -G "$PART_GLOB" > /dev/null; then
                echo "Found split gzip parts for $INPUT_FILE. Reassembling..."
                cat $PART_GLOB > "$GZ_FILE"
              fi

              if [ -f "$GZ_FILE" ]; then
                echo "Decompressing $GZ_FILE -> $INPUT_FILE"
                gzip -dc "$GZ_FILE" > "$INPUT_FILE"
                exit 0
              fi
              ;;
          esac

          echo "No usable input found for $INPUT_FILE"
          exit 1

      - name: Rank matchup file
        env:
          INPUT_FILE: ${{ github.event.inputs.input_file }}
          RULEBOOK_FILE: ${{ github.event.inputs.rulebook_file }}
          OUTPUT_FILE: ${{ github.event.inputs.output_file }}
          JUSTIFICATIONS_DIR: ${{ github.event.inputs.justifications_dir }}
        run: |
          if [ -n "$JUSTIFICATIONS_DIR" ]; then
            node scripts/rank-matchups.js --input "$INPUT_FILE" --rulebook "$RULEBOOK_FILE" --output "$OUTPUT_FILE" --justifications-dir "$JUSTIFICATIONS_DIR"
          else
            node scripts/rank-matchups.js --input "$INPUT_FILE" --rulebook "$RULEBOOK_FILE" --output "$OUTPUT_FILE"
          fi

      - name: Commit and push ranking output (optional)
        if: ${{ github.event.inputs.commit_and_push == 'true' }}
        env:
          INPUT_FILE: ${{ github.event.inputs.input_file }}
          OUTPUT_FILE: ${{ github.event.inputs.output_file }}
          JUSTIFICATIONS_DIR: ${{ github.event.inputs.justifications_dir }}
        run: |
          input_dir="$(dirname "$INPUT_FILE")"
          input_base="$(basename "$INPUT_FILE")"
          input_stem="${input_base%.*}"
          weighted_output_file="${input_dir}/${input_stem}_weighted.json"

          output_dir="$(dirname "$OUTPUT_FILE")"
          output_base="$(basename "$OUTPUT_FILE")"
          output_stem="${output_base%.*}"
          sanitized_stem="$(printf '%s' "$output_stem" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/_/g; s/^_+//; s/_+$//')"
          if [ -z "$sanitized_stem" ]; then
            sanitized_stem="ranking"
          fi
          default_justifications_dir="${output_dir}/${sanitized_stem}_justifications"
          resolved_justifications_dir="${JUSTIFICATIONS_DIR:-$default_justifications_dir}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$OUTPUT_FILE"
          git add "$weighted_output_file"
          git add "$resolved_justifications_dir"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update ranked matchups output and justifications"
          git push origin "${{ github.ref_name }}"

      - name: Resolve ranking artifact paths
        env:
          INPUT_FILE: ${{ github.event.inputs.input_file }}
          OUTPUT_FILE: ${{ github.event.inputs.output_file }}
          JUSTIFICATIONS_DIR: ${{ github.event.inputs.justifications_dir }}
        run: |
          input_dir="$(dirname "$INPUT_FILE")"
          input_base="$(basename "$INPUT_FILE")"
          input_stem="${input_base%.*}"
          weighted_output_file="${input_dir}/${input_stem}_weighted.json"

          output_dir="$(dirname "$OUTPUT_FILE")"
          output_base="$(basename "$OUTPUT_FILE")"
          output_stem="${output_base%.*}"
          sanitized_stem="$(printf '%s' "$output_stem" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/_/g; s/^_+//; s/_+$//')"
          if [ -z "$sanitized_stem" ]; then
            sanitized_stem="ranking"
          fi
          default_justifications_dir="${output_dir}/${sanitized_stem}_justifications"
          resolved_justifications_dir="${JUSTIFICATIONS_DIR:-$default_justifications_dir}"
          {
            echo "OUTPUT_FILE=$OUTPUT_FILE"
            echo "WEIGHTED_OUTPUT_FILE=$weighted_output_file"
            echo "RESOLVED_JUSTIFICATIONS_DIR=$resolved_justifications_dir"
          } >> "$GITHUB_ENV"

      - name: Upload ranking output artifact
        uses: actions/upload-artifact@v4
        with:
          name: ranked_matchups_output
          path: |
            ${{ env.OUTPUT_FILE }}
            ${{ env.WEIGHTED_OUTPUT_FILE }}
            ${{ env.RESOLVED_JUSTIFICATIONS_DIR }}
